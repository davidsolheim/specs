name: webhook-contract

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/webhook-contract.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/webhook-contract.yml'

jobs:
  contract-tests:
    name: CLI contract tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run contract tests
        run: bun test tests/api-formatters.test.ts | tee webhook-contract-test-output.txt

      - name: Upload contract test artifact
        uses: actions/upload-artifact@v4
        with:
          name: specs-webhook-contract-test-output
          path: webhook-contract-test-output.txt
