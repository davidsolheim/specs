name: SiteSpecs
on:
  workflow_dispatch:
jobs:
  sitespecs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Specs CI
        run: npx -y @sitespecs/specs@latest ci example.com --baseline baseline.json --save specs-analysis.json
      - name: Upload Specs artifact
        uses: actions/upload-artifact@v4
        with:
          name: specs-artifact
          path: specs-analysis.json
