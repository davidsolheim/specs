name: SiteSpecs
on:
  workflow_dispatch:
concurrency:
  group: specs-ci-example
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  sitespecs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Specs CI
        run: npx -y @sitespecs/specs@latest ci example.com --baseline baseline.json --fail-on-diff

