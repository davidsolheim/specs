name: SiteSpecs
on:
  workflow_dispatch:
jobs:
  sitespecs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Specs CI
        run: npx -y @sitespecs/specs@latest ci example.com --baseline baseline.json --fail-on-diff
